# Runs on `git commit` after `pre-commit install`. Mirrors the CI gate so a bad
# commit is caught locally, before it ever reaches a PR.
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
        exclude: (^|/)package-lock\.json$

  # Python: lint with ruff (config resolved from pyproject.toml). We lint but do
  # not enforce a repo-wide autoformatter — the source is deliberately
  # hand-aligned (e.g. the confidence engine) for readability.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: ["--fix"]

  # Type-check with the project's own mypy (needs the app deps on PATH, so it
  # runs as a system hook rather than in an isolated pre-commit env).
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        pass_filenames: false
        types: [python]
        files: ^(api|seed)/
