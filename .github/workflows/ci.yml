name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint · types · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r api/requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy
      - name: Test (pytest + coverage)
        run: pytest --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  deploy:
    name: deploy (Cloud Run)
    # Auto-ship master to the live demo once lint/types/tests and the frontend
    # build are all green. PRs never deploy.
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    # Serialize deploys so two quick pushes can't race each other.
    concurrency: deploy-cloud-run
    permissions:
      contents: read
      id-token: write # mint the GitHub OIDC token for keyless GCP auth
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/251148844884/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-deployer@antibody-hackathon-2026.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        # Env vars and secrets are managed on the service and preserved here —
        # this deploy only ships new code (see docs/deployment.md).
        run: |
          gcloud run deploy antibody \
            --source . \
            --region asia-south1 \
            --project antibody-hackathon-2026 \
            --memory 2Gi --cpu 1 --max-instances 3 \
            --allow-unauthenticated \
            --execution-environment gen2 --no-cpu-throttling \
            --quiet
      - name: Smoke test
        run: |
          BASE="https://antibody-251148844884.asia-south1.run.app"
          curl -sf "$BASE/health"
          # help_api runs as a second process in the container and can take a
          # few seconds to bind after Cloud Run marks the revision ready.
          for i in $(seq 1 10); do
            if curl -sf "$BASE/help/health"; then exit 0; fi
            echo "help/health not ready yet, retrying in 5s ($i/10)..."
            sleep 5
          done
          echo "help/health did not become ready in time" >&2
          exit 1
