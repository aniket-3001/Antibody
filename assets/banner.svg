<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Antibody — a glowing shield deflecting scam threats inside a knowledge-graph network">
  <title>Antibody — a collective immune system against scams</title>
  <desc>An abstract hero: a glowing shield at the centre of a knowledge-graph constellation deflects scam threats streaming in from both sides.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070a18"/>
      <stop offset="1" stop-color="#0e1330"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="-70" x2="0" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4338ca" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floor" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#8b93ff" opacity="0.10"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="360" rx="24"/></clipPath>
    <style>
      .node   { animation: np 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .n2 { animation-delay: .5s } .n3 { animation-delay: 1s } .n4 { animation-delay: 1.5s }
      .n5 { animation-delay: .3s } .n6 { animation-delay: .9s } .n7 { animation-delay: 1.4s } .n8 { animation-delay: 1.9s }
      @keyframes np { 0%,100% { opacity: .45; transform: scale(.9) } 50% { opacity: 1; transform: scale(1.1) } }
      .edge { stroke-dasharray: 5 11; animation: flow 2.6s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -32; } }
      .shield { animation: pulse 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
      .aura { animation: aura 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes aura { 0%,100% { opacity: .4; transform: scale(1); } 50% { opacity: .7; transform: scale(1.12); } }
      .ripple { animation: ripple 2.2s ease-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes ripple { 0% { opacity: 0; transform: scale(.55); } 55% { opacity: .8; transform: scale(1); } 100% { opacity: 0; transform: scale(1.55); } }
      .dl { animation: flyR 3.8s linear infinite; } .dr { animation: flyL 3.8s linear infinite; }
      .d2 { animation-delay: 1.2s } .d3 { animation-delay: 2.4s } .d4 { animation-delay: .7s } .d5 { animation-delay: 1.9s }
      @keyframes flyR { 0% { transform: translateX(0); opacity: 0 } 9% { opacity: 1 } 66% { transform: translateX(452px); opacity: 1 } 76% { transform: translateX(486px); opacity: 0 } 100% { opacity: 0 } }
      @keyframes flyL { 0% { transform: translateX(0); opacity: 0 } 9% { opacity: 1 } 66% { transform: translateX(-452px); opacity: 1 } 76% { transform: translateX(-486px); opacity: 0 } 100% { opacity: 0 } }
      @media (prefers-reduced-motion: reduce) {
        .node,.edge,.shield,.aura,.ripple,.dl,.dr { animation: none; }
        .dl,.dr { opacity: .85; }
      }
    </style>
  </defs>

  <g clip-path="url(#round)">
  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="360" fill="url(#dots)"/>
  <ellipse cx="600" cy="180" rx="440" ry="200" fill="url(#vignette)"/>

  <!-- Knowledge-graph constellation (the shared Cognee memory) -->
  <g fill="none" stroke="#6366f1" stroke-width="1.4" opacity="0.6">
    <path class="edge" d="M235,120 L360,92"/>
    <path class="edge" d="M360,92 L318,214"/>
    <path class="edge" d="M318,214 L210,244"/>
    <path class="edge" d="M210,244 L235,120"/>
    <path class="edge" d="M360,92 L470,150"/>
    <path class="edge" d="M965,120 L842,92"/>
    <path class="edge" d="M842,92 L884,214"/>
    <path class="edge" d="M884,214 L990,244"/>
    <path class="edge" d="M990,244 L965,120"/>
    <path class="edge" d="M842,92 L730,150"/>
  </g>
  <g fill="#a5b4fc" filter="url(#glow)">
    <circle class="node n1" cx="235" cy="120" r="5"/>
    <circle class="node n2" cx="360" cy="92" r="6"/>
    <circle class="node n3" cx="318" cy="214" r="5"/>
    <circle class="node n4" cx="210" cy="244" r="4.5"/>
    <circle class="node n5" cx="965" cy="120" r="5"/>
    <circle class="node n6" cx="842" cy="92" r="6"/>
    <circle class="node n7" cx="884" cy="214" r="5"/>
    <circle class="node n8" cx="990" cy="244" r="4.5"/>
    <circle class="node n5" cx="470" cy="150" r="3.5"/>
    <circle class="node n2" cx="730" cy="150" r="3.5"/>
  </g>

  <!-- Incoming scam threats, converging on the shield from both sides.
       Position lives on the outer <g> (a transform attribute); the inner <path>
       carries ONLY the CSS translateX animation, so the two compose instead of
       the CSS transform overriding the lane offset. -->
  <g fill="#f43f5e" filter="url(#glow)">
    <g transform="translate(70,120)"><path class="dl d1" d="M0,-9 L15,0 L0,9 L6,0 Z"/></g>
    <g transform="translate(70,180)"><path class="dl d2" d="M0,-9 L15,0 L0,9 L6,0 Z"/></g>
    <g transform="translate(70,240)"><path class="dl d3" d="M0,-9 L15,0 L0,9 L6,0 Z"/></g>
    <g transform="translate(1130,150)"><path class="dr d4" d="M0,-9 L-15,0 L0,9 L-6,0 Z"/></g>
    <g transform="translate(1130,220)"><path class="dr d5" d="M0,-9 L-15,0 L0,9 L-6,0 Z"/></g>
  </g>

  <!-- Antibody shield -->
  <g transform="translate(600,180)">
    <circle class="aura" cx="0" cy="0" r="96" fill="url(#floor)"/>
    <circle class="ripple" cx="0" cy="0" r="80" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <g class="shield">
      <path filter="url(#softglow)" d="M0,-70 L58,-46 L58,16 C58,55 32,80 0,92 C-32,80 -58,55 -58,16 L-58,-46 Z" fill="#6366f1" opacity="0.6"/>
      <path d="M0,-70 L58,-46 L58,16 C58,55 32,80 0,92 C-32,80 -58,55 -58,16 L-58,-46 Z"
            fill="url(#shieldGrad)" stroke="#c7d2fe" stroke-width="2"/>
      <path d="M-24,4 L-7,25 L29,-24" fill="none" stroke="#eafff7" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Floor reflection -->
  <ellipse cx="600" cy="322" rx="150" ry="16" fill="url(#floor)" opacity="0.5"/>
  </g>
</svg>
