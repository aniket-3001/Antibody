<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Antibody</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    width: 340px;
    margin: 0;
    padding: 14px;
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #1e293b;
    background: #f8fafc;
  }
  h1 {
    font-size: 15px;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  h1 .logo {
    width: 20px; height: 20px; border-radius: 6px;
    background: linear-gradient(135deg, #1e3a8a, #3b82f6);
    display: inline-block;
  }
  textarea {
    width: 100%;
    min-height: 80px;
    resize: vertical;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    padding: 8px;
    font: inherit;
    background: #fff;
  }
  .row { display: flex; gap: 8px; margin-top: 8px; }
  button {
    flex: 1;
    border: none;
    border-radius: 8px;
    padding: 8px 10px;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  .primary { background: #1e3a8a; color: #fff; }
  .primary:disabled { opacity: .6; cursor: default; }
  .secondary { background: #e2e8f0; color: #1e293b; }
  #result {
    margin-top: 12px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    background: #fff;
    display: none;
  }
  #result.show { display: block; }
  #result .band { font-weight: 800; font-size: 14px; margin-bottom: 4px; }
  #result .explain { color: #475569; }
  #err { color: #b91c1c; margin-top: 8px; display: none; }
  #err.show { display: block; }
  footer { margin-top: 10px; font-size: 11px; color: #94a3b8; text-align: center; }
  footer a { color: #1e3a8a; }
</style>
</head>
<body>
  <h1><span class="logo"></span>Antibody</h1>
  <textarea id="text" placeholder="Paste a suspicious message… or scan the page you're on."></textarea>
  <div class="row">
    <button id="checkBtn" class="primary">Check it</button>
    <button id="scanPageBtn" class="secondary">Scan this page</button>
  </div>
  <div id="result"></div>
  <div id="err"></div>
  <footer>Read-only check — nothing is saved. <a id="openApp" href="#">Open full app →</a></footer>
  <script src="popup.js"></script>
</body>
</html>
